<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/js_racer/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="JS Racer — a Flutter port of javascript-racer">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="js_racer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JS Racer</title>
  <link rel="manifest" href="manifest.json">
  <script src="engine_audio.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%;
                 overflow: hidden; background: #72D7EE; }
    flutter-view, flt-glass-pane { width: 100% !important; height: 100% !important; }
  </style>
  <script>
    // Flutter web can cache a stale viewport size when the page is opened in a
    // background/programmatically-sized window. Nudge it to re-measure whenever
    // the window gains focus, becomes visible, or is resized.
    (function () {
      // The Flutter web engine measures the viewport via `visualViewport`
      // (and a ResizeObserver), NOT the window 'resize' event. When the page
      // is first laid out in a background/narrow tab it can latch onto a wrong
      // size and never re-measure. Fire a visualViewport 'resize' so the engine
      // re-reads the (correct) current size.
      function nudge() {
        var ev = new Event('resize');
        window.dispatchEvent(ev);
        if (window.visualViewport) window.visualViewport.dispatchEvent(new Event('resize'));
      }
      window.addEventListener('focus', nudge);
      window.addEventListener('pageshow', nudge);
      document.addEventListener('visibilitychange', nudge);
      window.addEventListener('load', function () {
        [0, 100, 300, 700, 1500, 3000].forEach(function (t) { setTimeout(nudge, t); });
      });
      // keep nudging until the engine's view matches the window (max ~6s)
      var tries = 0;
      var iv = setInterval(function () {
        var v = document.querySelector('flutter-view');
        var w = v ? v.getBoundingClientRect().width : 0;
        if (Math.abs(w - window.innerWidth) > 4) nudge();
        if (++tries > 60) clearInterval(iv);
      }, 100);
      try { new ResizeObserver(nudge).observe(document.documentElement); } catch (e) {}
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <!-- TEMP diagnostic badge: shows real viewport vs flutter-view size -->
  <div id="dbg" style="position:fixed;left:6px;bottom:6px;z-index:99999;
       font:12px/1.3 monospace;color:#0f0;background:rgba(0,0,0,.7);
       padding:4px 6px;border-radius:4px;pointer-events:none;white-space:pre"></div>
  <script>
    (function () {
      var el = document.getElementById('dbg');
      function tick() {
        var v = document.querySelector('flutter-view');
        var vb = v ? v.getBoundingClientRect() : null;
        el.textContent =
          'win ' + window.innerWidth + 'x' + window.innerHeight +
          ' dpr' + window.devicePixelRatio + '\n' +
          'fview ' + (vb ? Math.round(vb.width) + 'x' + Math.round(vb.height) : 'n/a') +
          '\nclientW ' + document.documentElement.clientWidth;
      }
      setInterval(tick, 500); tick();
    })();
  </script>
</body>
</html>
