<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/js_racer/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="JS Racer — a Flutter port of javascript-racer">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="js_racer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JS Racer</title>
  <link rel="manifest" href="manifest.json">
  <script src="engine_audio.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%;
                 overflow: hidden; background: #72D7EE; }
    flutter-view, flt-glass-pane { width: 100% !important; height: 100% !important; }
  </style>
  <script>
    // Flutter web can cache a stale viewport size when the page is opened in a
    // background/programmatically-sized window. Nudge it to re-measure whenever
    // the window gains focus, becomes visible, or is resized.
    (function () {
      function nudge() { window.dispatchEvent(new Event('resize')); }
      window.addEventListener('focus', nudge);
      window.addEventListener('pageshow', nudge);
      document.addEventListener('visibilitychange', nudge);
      window.addEventListener('load', function () {
        nudge();
        setTimeout(nudge, 200);
        setTimeout(nudge, 800);
        setTimeout(nudge, 2000);
      });
      try { new ResizeObserver(nudge).observe(document.documentElement); } catch (e) {}
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.

    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
