<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="JS Racer — a Flutter port of javascript-racer">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="JS Racer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JS Racer</title>
  <link rel="manifest" href="manifest.json">
  <script src="engine_audio.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%;
                 overflow: hidden; background: #72D7EE; }
    /* Flutter is mounted into this full-screen host element. Using an explicit
       host (instead of full-page mode) makes the engine track size via a
       ResizeObserver on this element, which reliably fills the window even when
       the page is first laid out in a background/narrow tab. */
    #flutter_host { position: fixed; inset: 0; width: 100%; height: 100%; }
  </style>
  <!-- diagnostic badge (temporary) -->
  <script>
    window.addEventListener('load', function () {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;left:6px;bottom:6px;z-index:99999;' +
        'font:12px/1.3 monospace;color:#0f0;background:rgba(0,0,0,.7);' +
        'padding:4px 6px;border-radius:4px;pointer-events:none;white-space:pre';
      document.body.appendChild(el);
      setInterval(function () {
        var v = document.querySelector('flutter-view');
        var c = document.querySelector('flutter-view canvas') || document.querySelector('canvas');
        var vb = v && v.getBoundingClientRect();
        var cb = c && c.getBoundingClientRect();
        el.textContent =
          'win ' + window.innerWidth + 'x' + window.innerHeight +
          ' dpr' + (Math.round(window.devicePixelRatio * 100) / 100) + '\n' +
          'fview ' + (vb ? Math.round(vb.width) + 'x' + Math.round(vb.height) : 'n/a') + '\n' +
          'canvas ' + (cb ? Math.round(cb.width) + 'x' + Math.round(cb.height) : 'n/a');
      }, 400);
    });
  </script>
</head>
<body>
  <div id="flutter_host"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
